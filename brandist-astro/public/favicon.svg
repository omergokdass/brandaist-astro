<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <g transform="translate(64, 128)">
    <!-- Main rectangle for the awning -->
    <rect x="0" y="20" width="384" height="150" fill="#2980b9"/>
    
    <!-- White Stripes -->
    <rect x="96" y="20" width="96" height="150" fill="#ecf0f1"/>
    <rect x="288" y="20" width="96" height="150" fill="#ecf0f1"/>

    <!-- Scalloped Valance (Ondüleli etek kısmı) -->
